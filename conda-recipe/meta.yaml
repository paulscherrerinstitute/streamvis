{% set version_match = load_file_regex(load_file="streamvis/__init__.py", regex_pattern='__version__ = "(.+?)"') %}
{% set version = version_match[1] %}
{% set pyproject = load_file_data('pyproject.toml') %}

package:
  name: {{ pyproject['project']['name'] }}
  version: {{ version }}

source:
  path: ..

build:
  script: python -m pip install .
  noarch: python
  entry_points:
    - streamvis = streamvis.cli:main

requirements:
  host:
    - python {{ pyproject['project']['requires-python'] }}
    - hatchling
  run:
    - python {{ pyproject['project']['requires-python'] }}
    - numba
    - bokeh ~=3.9.0
    - jungfrau_utils ~=3.19
    - pyzmq
    - pillow >=4.3
    - colorcet
    - bottleneck
    - cbor2

test:
  source_files:
    - tests
  requires:
    - pytest
  commands:
    - pytest tests

about:
  home: {{ pyproject['project']['urls']['Homepage'] }}
  summary: {{ pyproject['project']['description'] }}
  license: {{ pyproject['project']['license'] }}
  license_file:
    {% for lf in pyproject['project']['license-files'] %}
    - {{ lf }}
    {% endfor %}
